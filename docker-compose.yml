services:
  db:
    image: pgvector/pgvector:pg16  # pgvector extension for AI memory embeddings
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: planflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/planflow
      DEBUG: "true"
      SECRET_KEY: dev-secret-key-not-for-production
      FRONTEND_ORIGIN: http://localhost:5173
      COOKIE_SECURE: "false"
      # Optional: AI chat model (defaults to AI_DEFAULT_MODEL)
      # AI_CHAT_MODEL: openai/gpt-4o
      # Optional: Tavily API key for web search tool in AI chat
      # TAVILY_API_KEY: tvly-xxxxx
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
